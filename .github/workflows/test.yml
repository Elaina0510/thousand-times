name: Test Workflow

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Test Python environment
        run: |
          python --version
          pip list
          echo "PYTHONPATH=${{ github.workspace }}/src"
          python -c "import sys; sys.path.insert(0, 'src'); import config; print('Config imported successfully')"

      - name: Test main.py import
        env:
          PYTHONPATH: ${{ github.workspace }}/src
        run: python -c "import main; print('Main module imported successfully')"
