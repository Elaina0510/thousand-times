name: Daily Stock Analysis

on:
  # 定时调度：工作日北京时间12:00（UTC 04:00）
  schedule:
    - cron: '0 4 * * 1-5'
  # 支持手动触发
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Create output directories
        run: mkdir -p logs charts

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run analysis
        id: analysis
        env:
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          LLM_API_URL: ${{ secrets.LLM_API_URL }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          PYTHONPATH: ${{ github.workspace }}/src
        run: |
          echo "Starting analysis..."
          python src/main.py 2>&1 | tee logs/analysis_output.log
          echo "Analysis completed with exit code: $?"

      - name: Display logs
        if: always()
        run: |
          echo "=== Analysis Output ==="
          if [ -f "logs/analysis_output.log" ]; then
            cat logs/analysis_output.log
          else
            echo "No log file found"
          fi
          echo ""
          echo "=== Analysis Log ==="
          if [ -f "logs/analysis.log" ]; then
            cat logs/analysis.log
          else
            echo "No analysis log found"
          fi

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: logs
          path: logs/
          if-no-files-found: ignore

      - name: Upload charts
        if: success()
        uses: actions/upload-artifact@v5
        with:
          name: charts
          path: charts/
          retention-days: 7
          if-no-files-found: ignore
