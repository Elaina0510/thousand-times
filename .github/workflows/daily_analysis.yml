name: Daily Stock Analysis

on:
  # 定时调度：工作日北京时间11:45（UTC 03:45）
  # 使用非整点时间避免 GitHub Actions 调度延迟
  schedule:
    - cron: '45 3 * * 1-5'
  # 支持手动触发
  workflow_dispatch:

# 添加 permissions 以支持 GitHub Pages 部署
permissions:
  contents: read
  pages: write
  id-token: write

# 确保同时只有一个部署任务
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  analyze:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Chinese fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-wqy-zenhei fonts-wqy-microhei
          fc-cache -fv

      - name: Create output directories
        run: mkdir -p logs charts public

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run analysis
        id: analysis
        env:
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          LLM_API_URL: ${{ secrets.LLM_API_URL }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          STOCK_API_URL: ${{ secrets.STOCK_API_URL }}
          PYTHONPATH: ${{ github.workspace }}/src
          CI: true
        run: |
          echo "Starting analysis..."
          python src/main.py 2>&1 | tee logs/analysis_output.log
          echo "Analysis completed with exit code: $?"

      - name: Display logs
        if: always()
        run: |
          echo "=== Analysis Output ==="
          if [ -f "logs/analysis_output.log" ]; then
            cat logs/analysis_output.log
          else
            echo "No log file found"
          fi
          echo ""
          echo "=== Analysis Log ==="
          if [ -f "logs/analysis.log" ]; then
            cat logs/analysis.log
          else
            echo "No analysis log found"
          fi

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: logs
          path: logs/
          if-no-files-found: ignore

      - name: Upload charts
        if: success()
        uses: actions/upload-artifact@v5
        with:
          name: charts
          path: charts/
          retention-days: 7
          if-no-files-found: ignore

      # GitHub Pages 部署
      - name: Setup Pages
        if: success()
        uses: actions/configure-pages@v5

      - name: Upload artifact for GitHub Pages
        if: success()
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'public'

      - name: Deploy to GitHub Pages
        if: success()
        id: deployment
        uses: actions/deploy-pages@v4
